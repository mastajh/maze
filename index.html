<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5f3ee">
<title>미로 생성기</title>
<style>
  :root {
    --bg: #f5f3ee;
    --panel: #ffffff;
    --border: #d8d3c7;
    --text: #2a2a2a;
    --muted: #6b6b6b;
    --accent: #2f6fed;
    --accent-hover: #1f5bd6;
    --share: #22a06b;
    --share-hover: #1a8256;
    --start: #3cb450;
    --goal: #e63232;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }
  aside.controls {
    width: 340px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  main {
    flex: 1;
    padding: 24px;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 700;
  }
  h1 .sub {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
  }
  label.field {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 13px;
    color: var(--muted);
  }
  label.field input, label.field select {
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    background: #fff;
    min-height: 44px;
  }
  label.field input[type=range] { padding: 0; min-height: 32px; }
  label.field input:focus, label.field select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .desc {
    font-size: 12px;
    color: var(--muted);
    background: #faf8f2;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    line-height: 1.5;
    min-height: 46px;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text);
    padding: 6px 0;
  }
  .checkbox-row input { width: 20px; height: 20px; }
  .algo-params {
    border-top: 1px dashed var(--border);
    padding-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .algo-params:empty { display: none; }
  button {
    padding: 13px 14px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
    min-height: 48px;
  }
  button:active { transform: scale(0.98); }
  button.primary { background: var(--accent); color: white; }
  button.primary:hover { background: var(--accent-hover); }
  button.share { background: var(--share); color: white; }
  button.share:hover { background: var(--share-hover); }
  button.secondary { background: #eeeae0; color: var(--text); }
  button.secondary:hover { background: #e0dbce; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  canvas {
    background: white;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    max-width: 100%;
    height: auto !important;
    display: block;
  }
  .status {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    min-height: 18px;
  }
  .legend {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--muted);
    align-items: center;
    justify-content: center;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .dot.start { background: var(--start); }
  .dot.goal { background: var(--goal); }

  /* Mobile */
  @media (max-width: 768px) {
    body { flex-direction: column; }
    aside.controls {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 16px;
      gap: 12px;
    }
    main { padding: 12px; }
    h1 { font-size: 18px; }
    h1 .sub { display: none; }
    .desc { font-size: 12px; padding: 8px 10px; }
  }

  @media print {
    aside.controls { display: none; }
    main { padding: 0; }
    canvas { border: none; box-shadow: none; }
    body { background: white; }
  }
</style>
</head>
<body>
<aside class="controls">
  <h1>미로 생성기<span class="sub">Backtracking · Prim · Kruskal · Wilson · Division · Sidewinder</span></h1>

  <label class="field">
    알고리즘
    <select id="algo">
      <option value="backtracking">Recursive Backtracking — 구불구불</option>
      <option value="prims">Prim's — 분기 많음</option>
      <option value="kruskals">Kruskal's — 균일, 짧은 경로</option>
      <option value="wilsons">Wilson's — 편향 없음</option>
      <option value="division">Recursive Division — 방 구조</option>
      <option value="sidewinder">Sidewinder — 수평 흐름</option>
    </select>
  </label>
  <div class="desc" id="desc"></div>

  <div class="row2">
    <label class="field">가로 (칸)
      <input type="number" id="width" value="18" min="3" max="150" inputmode="numeric">
    </label>
    <label class="field">세로 (칸)
      <input type="number" id="height" value="24" min="3" max="150" inputmode="numeric">
    </label>
  </div>
  <label class="field">셀 크기 (픽셀)
    <input type="number" id="cellSize" value="24" min="6" max="80" inputmode="numeric">
  </label>
  <label class="field">시드 (비우면 랜덤)
    <input type="text" id="seed" placeholder="예: 42" inputmode="text">
  </label>

  <div class="algo-params" id="algoParams"></div>

  <label class="checkbox-row">
    <input type="checkbox" id="showSolution">
    정답 경로 표시 (부모용)
  </label>

  <button class="primary" id="generate">미로 만들기</button>
  <button class="share" id="copy">클립보드에 복사</button>
  <div class="btn-row">
    <button class="secondary" id="share">공유</button>
    <button class="secondary" id="download">PNG 저장</button>
  </div>
  <button class="secondary" id="print">인쇄</button>

  <div class="legend">
    <span><span class="dot start"></span>출발</span>
    <span><span class="dot goal"></span>도착</span>
  </div>
  <div class="status" id="status"></div>
</aside>

<main>
  <canvas id="canvas"></canvas>
</main>

<script>
const DX = {N:0, E:1, S:0, W:-1};
const DY = {N:-1, E:0, S:1, W:0};
const OPP = {N:'S', S:'N', E:'W', W:'E'};
const DIRS = ['N','E','S','W'];

const DESCRIPTIONS = {
  backtracking: "깊이우선 탐색으로 길을 뚫어나가는 가장 유명한 방법. 길고 구불구불한 통로가 많이 생겨 \"유기적\"인 느낌이 강합니다.",
  prims: "현재까지 만든 미로에서 바깥쪽으로 랜덤 확장. 짧은 분기와 막다른 길이 많이 생깁니다.",
  kruskals: "모든 벽을 섞어놓고 사이클이 안 생기면 허물기. 전체적으로 균일하고 짧은 경로가 많습니다.",
  wilsons: "편향 없는 완벽한 무작위 신장 트리. 가장 \"공평한\" 미로지만 큰 사이즈에서 느릴 수 있어요.",
  division: "방을 벽으로 계속 쪼개 내려가는 하향식. 긴 일직선 벽과 방 구조가 특징.",
  sidewinder: "윗줄부터 행 단위로 진행하며 북쪽 통로를 뚫음. 수평 통로가 강조되는 독특한 패턴.",
};

const ALGO_PARAMS = {
  sidewinder: [
    { id: 'sidewinderBias', label: '수평 치우침 (0 = 세로 많이, 1 = 가로 많이)', type: 'range', min: 0.1, max: 0.9, step: 0.05, default: 0.5 },
  ],
  division: [
    { id: 'divisionBias', label: '분할 방향 편향 (0 = 세로벽, 1 = 가로벽)', type: 'range', min: 0, max: 1, step: 0.05, default: 0.5 },
  ],
};

function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function makeRng(seedStr) {
  let seed;
  if (seedStr && seedStr.trim() !== '') {
    seed = 0;
    for (const c of seedStr) seed = (seed * 31 + c.charCodeAt(0)) | 0;
  } else {
    seed = (Math.random() * 2**32) | 0;
  }
  return { rng: mulberry32(seed >>> 0), seed };
}

function createGrid(w, h, wallsOn = true) {
  const grid = [];
  for (let y = 0; y < h; y++) {
    const row = [];
    for (let x = 0; x < w; x++) row.push({ N: wallsOn, E: wallsOn, S: wallsOn, W: wallsOn });
    grid.push(row);
  }
  return grid;
}
function carve(grid, x, y, dir) {
  grid[y][x][dir] = false;
  grid[y + DY[dir]][x + DX[dir]][OPP[dir]] = false;
}
function shuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function backtracking(w, h, rng) {
  const grid = createGrid(w, h);
  const visited = Array.from({ length: h }, () => Array(w).fill(false));
  const stack = [[0, 0]];
  visited[0][0] = true;
  while (stack.length) {
    const [x, y] = stack[stack.length - 1];
    const ns = [];
    for (const d of DIRS) {
      const nx = x + DX[d], ny = y + DY[d];
      if (nx >= 0 && nx < w && ny >= 0 && ny < h && !visited[ny][nx]) ns.push([d, nx, ny]);
    }
    if (ns.length) {
      const [d, nx, ny] = ns[Math.floor(rng() * ns.length)];
      carve(grid, x, y, d);
      visited[ny][nx] = true;
      stack.push([nx, ny]);
    } else stack.pop();
  }
  return grid;
}

function prims(w, h, rng) {
  const grid = createGrid(w, h);
  const inMaze = Array.from({ length: h }, () => Array(w).fill(false));
  const frontier = [];
  const sx = Math.floor(rng() * w), sy = Math.floor(rng() * h);
  inMaze[sy][sx] = true;
  for (const d of DIRS) {
    const nx = sx + DX[d], ny = sy + DY[d];
    if (nx >= 0 && nx < w && ny >= 0 && ny < h) frontier.push([nx, ny]);
  }
  while (frontier.length) {
    const idx = Math.floor(rng() * frontier.length);
    const [x, y] = frontier[idx];
    frontier[idx] = frontier[frontier.length - 1];
    frontier.pop();
    if (inMaze[y][x]) continue;
    const linkable = [];
    for (const d of DIRS) {
      const nx = x + DX[d], ny = y + DY[d];
      if (nx >= 0 && nx < w && ny >= 0 && ny < h && inMaze[ny][nx]) linkable.push(d);
    }
    const d = linkable[Math.floor(rng() * linkable.length)];
    carve(grid, x, y, d);
    inMaze[y][x] = true;
    for (const d of DIRS) {
      const nx = x + DX[d], ny = y + DY[d];
      if (nx >= 0 && nx < w && ny >= 0 && ny < h && !inMaze[ny][nx]) frontier.push([nx, ny]);
    }
  }
  return grid;
}

function kruskals(w, h, rng) {
  const grid = createGrid(w, h);
  const parent = new Array(w * h);
  for (let i = 0; i < w * h; i++) parent[i] = i;
  const find = a => {
    while (parent[a] !== a) { parent[a] = parent[parent[a]]; a = parent[a]; }
    return a;
  };
  const walls = [];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (x < w - 1) walls.push([x, y, 'E']);
      if (y < h - 1) walls.push([x, y, 'S']);
    }
  }
  shuffle(walls, rng);
  for (const [x, y, d] of walls) {
    const nx = x + DX[d], ny = y + DY[d];
    const a = find(y * w + x), b = find(ny * w + nx);
    if (a !== b) { parent[a] = b; carve(grid, x, y, d); }
  }
  return grid;
}

function wilsons(w, h, rng) {
  const grid = createGrid(w, h);
  const inMaze = Array.from({ length: h }, () => Array(w).fill(false));
  const sx = Math.floor(rng() * w), sy = Math.floor(rng() * h);
  inMaze[sy][sx] = true;
  const remaining = [];
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) if (!(x === sx && y === sy)) remaining.push([x, y]);
  shuffle(remaining, rng);
  for (const [startX, startY] of remaining) {
    if (inMaze[startY][startX]) continue;
    const dirFrom = Array.from({ length: h }, () => Array(w).fill(null));
    let x = startX, y = startY;
    while (!inMaze[y][x]) {
      let d, nx, ny;
      do {
        d = DIRS[Math.floor(rng() * 4)];
        nx = x + DX[d]; ny = y + DY[d];
      } while (nx < 0 || nx >= w || ny < 0 || ny >= h);
      dirFrom[y][x] = d;
      x = nx; y = ny;
    }
    x = startX; y = startY;
    while (!inMaze[y][x]) {
      const d = dirFrom[y][x];
      carve(grid, x, y, d);
      inMaze[y][x] = true;
      x += DX[d]; y += DY[d];
    }
  }
  return grid;
}

function recursiveDivision(w, h, rng, params) {
  const bias = (params && params.divisionBias != null) ? params.divisionBias : 0.5;
  const grid = createGrid(w, h, false);
  for (let x = 0; x < w; x++) { grid[0][x].N = true; grid[h-1][x].S = true; }
  for (let y = 0; y < h; y++) { grid[y][0].W = true; grid[y][w-1].E = true; }
  function divide(x, y, ww, hh) {
    if (ww < 2 || hh < 2) return;
    let horizontal;
    if (hh > ww * 1.2) horizontal = true;
    else if (ww > hh * 1.2) horizontal = false;
    else horizontal = rng() < bias;
    if (horizontal) {
      const wy = y + Math.floor(rng() * (hh - 1));
      const px = x + Math.floor(rng() * ww);
      for (let i = x; i < x + ww; i++) {
        if (i === px) continue;
        grid[wy][i].S = true; grid[wy + 1][i].N = true;
      }
      divide(x, y, ww, wy - y + 1);
      divide(x, wy + 1, ww, y + hh - wy - 1);
    } else {
      const wx = x + Math.floor(rng() * (ww - 1));
      const py = y + Math.floor(rng() * hh);
      for (let i = y; i < y + hh; i++) {
        if (i === py) continue;
        grid[i][wx].E = true; grid[i][wx + 1].W = true;
      }
      divide(x, y, wx - x + 1, hh);
      divide(wx + 1, y, x + ww - wx - 1, hh);
    }
  }
  divide(0, 0, w, h);
  return grid;
}

function sidewinder(w, h, rng, params) {
  const bias = (params && params.sidewinderBias != null) ? params.sidewinderBias : 0.5;
  const grid = createGrid(w, h);
  for (let y = 0; y < h; y++) {
    let runStart = 0;
    for (let x = 0; x < w; x++) {
      const atEast = x === w - 1;
      const atNorth = y === 0;
      const close = atEast || (!atNorth && rng() > bias);
      if (close) {
        if (!atNorth) {
          const cx = runStart + Math.floor(rng() * (x - runStart + 1));
          carve(grid, cx, y, 'N');
        }
        runStart = x + 1;
      } else {
        carve(grid, x, y, 'E');
      }
    }
  }
  return grid;
}

const ALGORITHMS = {
  backtracking, prims, kruskals, wilsons, division: recursiveDivision, sidewinder,
};

function solvePath(grid) {
  const h = grid.length, w = grid[0].length;
  const prev = Array.from({ length: h }, () => Array(w).fill(null));
  const visited = Array.from({ length: h }, () => Array(w).fill(false));
  visited[0][0] = true;
  const queue = [[0, 0]];
  let head = 0;
  const ex = w - 1, ey = h - 1;
  while (head < queue.length) {
    const [x, y] = queue[head++];
    if (x === ex && y === ey) break;
    for (const d of DIRS) {
      if (grid[y][x][d]) continue;
      const nx = x + DX[d], ny = y + DY[d];
      if (nx < 0 || nx >= w || ny < 0 || ny >= h || visited[ny][nx]) continue;
      visited[ny][nx] = true;
      prev[ny][nx] = [x, y];
      queue.push([nx, ny]);
    }
  }
  const path = [];
  let cur = [ex, ey];
  while (cur) { path.push(cur); cur = prev[cur[1]][cur[0]]; }
  return path.reverse();
}

function render(canvas, grid, cellSize, showSolution) {
  const h = grid.length, w = grid[0].length;
  const wallThick = Math.max(1, Math.floor(cellSize / 11));
  const totalW = w * cellSize + wallThick;
  const totalH = h * cellSize + wallThick;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = totalW * dpr;
  canvas.height = totalH * dpr;
  canvas.style.width = totalW + 'px';
  canvas.style.aspectRatio = totalW + ' / ' + totalH;
  canvas.style.removeProperty('height');
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, totalW, totalH);

  const off = wallThick / 2;
  ctx.strokeStyle = '#141414';
  ctx.lineWidth = wallThick;
  ctx.lineCap = 'square';
  ctx.beginPath();
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const x0 = x * cellSize + off, y0 = y * cellSize + off;
      const x1 = x0 + cellSize, y1 = y0 + cellSize;
      if (grid[y][x].N) { ctx.moveTo(x0 - off, y0); ctx.lineTo(x1 + off, y0); }
      if (grid[y][x].W) { ctx.moveTo(x0, y0 - off); ctx.lineTo(x0, y1 + off); }
      if (x === w - 1 && grid[y][x].E) { ctx.moveTo(x1, y0 - off); ctx.lineTo(x1, y1 + off); }
      if (y === h - 1 && grid[y][x].S) { ctx.moveTo(x0 - off, y1); ctx.lineTo(x1 + off, y1); }
    }
  }
  ctx.stroke();

  if (showSolution) {
    const path = solvePath(grid);
    ctx.strokeStyle = 'rgba(255, 170, 20, 0.55)';
    ctx.lineWidth = Math.max(2, cellSize * 0.35);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < path.length; i++) {
      const [x, y] = path[i];
      const cx = x * cellSize + cellSize / 2 + off;
      const cy = y * cellSize + cellSize / 2 + off;
      if (i === 0) ctx.moveTo(cx, cy); else ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }

  const pad = Math.max(3, cellSize / 5);
  ctx.fillStyle = '#3cb450';
  ctx.beginPath();
  ctx.arc(cellSize / 2 + off, cellSize / 2 + off, cellSize / 2 - pad, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#e63232';
  ctx.beginPath();
  ctx.arc((w - 0.5) * cellSize + off, (h - 0.5) * cellSize + off, cellSize / 2 - pad, 0, Math.PI * 2);
  ctx.fill();
}

const $ = id => document.getElementById(id);
const canvas = $('canvas');
const statusEl = $('status');
const descEl = $('desc');
const algoParamsEl = $('algoParams');
let currentParamValues = {};

function updateAlgoUI() {
  const algo = $('algo').value;
  descEl.textContent = DESCRIPTIONS[algo] || '';
  algoParamsEl.innerHTML = '';
  const params = ALGO_PARAMS[algo] || [];
  for (const p of params) {
    const wrap = document.createElement('label');
    wrap.className = 'field';
    wrap.innerHTML = `${p.label} <span id="${p.id}_val" style="color:#2a2a2a">${(currentParamValues[p.id] ?? p.default)}</span>`;
    const input = document.createElement('input');
    input.type = p.type;
    input.id = p.id;
    input.min = p.min; input.max = p.max; input.step = p.step;
    input.value = currentParamValues[p.id] ?? p.default;
    input.addEventListener('input', e => {
      currentParamValues[p.id] = parseFloat(e.target.value);
      document.getElementById(p.id + '_val').textContent = parseFloat(e.target.value).toFixed(2);
    });
    wrap.appendChild(input);
    algoParamsEl.appendChild(wrap);
  }
}

function currentFilename() {
  const algo = $('algo').value;
  const w = $('width').value, h = $('height').value;
  const stamp = new Date().toISOString().replace(/[:T]/g, '-').slice(0, 19);
  return `maze_${algo}_${w}x${h}_${stamp}.png`;
}

function generate() {
  const algo = $('algo').value;
  const w = Math.max(3, Math.min(150, parseInt($('width').value) || 20));
  const h = Math.max(3, Math.min(150, parseInt($('height').value) || 20));
  const cellSize = Math.max(6, Math.min(80, parseInt($('cellSize').value) || 24));
  const showSol = $('showSolution').checked;
  const { rng, seed } = makeRng($('seed').value);

  statusEl.textContent = '생성 중...';
  setTimeout(() => {
    const t0 = performance.now();
    const grid = ALGORITHMS[algo](w, h, rng, currentParamValues);
    render(canvas, grid, cellSize, showSol);
    const ms = Math.round(performance.now() - t0);
    statusEl.textContent = `${w}×${h} · ${algo} · ${ms}ms · seed ${seed}`;
    if (window.matchMedia('(max-width: 768px)').matches) {
      canvas.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 10);
}

function canUseClipboard() {
  return !!(navigator.clipboard && window.ClipboardItem && window.isSecureContext);
}

async function copyToClipboard() {
  statusEl.textContent = '복사 중...';
  if (canUseClipboard()) {
    try {
      const item = new ClipboardItem({
        'image/png': new Promise(resolve => canvas.toBlob(resolve, 'image/png'))
      });
      await navigator.clipboard.write([item]);
      statusEl.textContent = '클립보드에 복사됨 — 메시지에 붙여넣기 하세요';
      return;
    } catch (e) {
      console.warn('clipboard write failed:', e);
    }
  }
  statusEl.textContent = '클립보드 불가 (file:// 또는 미지원) — 공유로 전환';
  await shareMaze();
}

async function shareMaze() {
  statusEl.textContent = '공유 준비 중...';
  canvas.toBlob(async blob => {
    if (!blob) { statusEl.textContent = '이미지 변환 실패'; return; }
    const filename = currentFilename();
    const file = new File([blob], filename, { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: '미로', text: '이 미로 풀어봐!' });
        statusEl.textContent = '공유 완료';
      } catch (e) {
        if (e.name !== 'AbortError') statusEl.textContent = '공유 취소 또는 실패';
        else statusEl.textContent = '';
      }
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      statusEl.textContent = '공유 기능 미지원 — 파일로 저장됨';
    }
  }, 'image/png');
}

function downloadPng() {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = currentFilename(); a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

$('algo').addEventListener('change', updateAlgoUI);
$('generate').addEventListener('click', generate);
$('copy').addEventListener('click', copyToClipboard);
$('share').addEventListener('click', shareMaze);
$('download').addEventListener('click', downloadPng);
$('print').addEventListener('click', () => window.print());

updateAlgoUI();
generate();
</script>
</body>
</html>
