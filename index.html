<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>미로 놀이터 🖍️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">

<style>
  html, body, #root { margin:0; padding:0; height:100%; width:100%; overflow:hidden; font-family:'Pretendard','Noto Sans KR',sans-serif; }
  * { box-sizing: border-box; }
  @keyframes twinkle { 0%,100% { opacity:.3; transform:scale(1); } 50% { opacity:.9; transform:scale(1.4); } }
  @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
// maze-engine.js — 6개 알고리즘 엔진
// 모든 알고리즘은 step()을 yield하는 generator를 반환.
// grid는 cells[y][x] = {walls: {N,E,S,W}, visited} 구조.

(function () {
  // ── 시드 랜덤 ────────────────────────────────────
  function mulberry32(seed) {
    return function () {
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function hashSeed(s) {
    if (!s) return (Math.random() * 2 ** 32) >>> 0;
    let h = 2166136261;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return h >>> 0;
  }

  // ── grid 만들기 ─────────────────────────────────
  function makeGrid(cols, rows) {
    const cells = [];
    for (let y = 0; y < rows; y++) {
      const row = [];
      for (let x = 0; x < cols; x++) row.push({ x, y, walls: { N: true, E: true, S: true, W: true }, visited: false });
      cells.push(row);
    }
    return { cols, rows, cells };
  }

  const OPP = { N: 'S', S: 'N', E: 'W', W: 'E' };
  const DX = { N: 0, S: 0, E: 1, W: -1 };
  const DY = { N: -1, S: 1, E: 0, W: 0 };

  function removeWall(a, b, dir) {
    a.walls[dir] = false;
    b.walls[OPP[dir]] = false;
  }

  function neighbors(grid, c) {
    const out = [];
    for (const d of ['N', 'E', 'S', 'W']) {
      const nx = c.x + DX[d], ny = c.y + DY[d];
      if (nx >= 0 && ny >= 0 && nx < grid.cols && ny < grid.rows) out.push({ dir: d, cell: grid.cells[ny][nx] });
    }
    return out;
  }

  function shuffle(arr, rnd) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rnd() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ── 알고리즘별 제너레이터 ────────────────────────
  // 각 generator는 {type, cells:[...]} 를 yield — cells는 "현재 프론티어"로 렌더.

  function* backtracking(grid, rnd) {
    const stack = [grid.cells[0][0]];
    grid.cells[0][0].visited = true;
    while (stack.length) {
      const cur = stack[stack.length - 1];
      const unv = neighbors(grid, cur).filter(n => !n.cell.visited);
      if (!unv.length) { stack.pop(); yield { frontier: [cur], tail: stack.slice() }; continue; }
      const { cell: nxt, dir } = unv[Math.floor(rnd() * unv.length)];
      removeWall(cur, nxt, dir);
      nxt.visited = true;
      stack.push(nxt);
      yield { frontier: [nxt], tail: stack.slice() };
    }
  }

  function* prims(grid, rnd) {
    const start = grid.cells[0][0];
    start.visited = true;
    const frontier = neighbors(grid, start).map(n => ({ from: start, to: n.cell, dir: n.dir }));
    while (frontier.length) {
      const i = Math.floor(rnd() * frontier.length);
      const edge = frontier.splice(i, 1)[0];
      if (edge.to.visited) continue;
      removeWall(edge.from, edge.to, edge.dir);
      edge.to.visited = true;
      for (const n of neighbors(grid, edge.to)) if (!n.cell.visited) frontier.push({ from: edge.to, to: n.cell, dir: n.dir });
      yield { frontier: [edge.to], edges: frontier.map(e => e.to) };
    }
  }

  function* kruskals(grid, rnd) {
    const parent = new Map();
    const find = a => parent.get(a) === a ? a : (parent.set(a, find(parent.get(a))), parent.get(a));
    const union = (a, b) => { const ra = find(a), rb = find(b); if (ra !== rb) { parent.set(ra, rb); return true; } return false; };
    for (let y = 0; y < grid.rows; y++) for (let x = 0; x < grid.cols; x++) parent.set(grid.cells[y][x], grid.cells[y][x]);
    const edges = [];
    for (let y = 0; y < grid.rows; y++) for (let x = 0; x < grid.cols; x++) {
      if (x + 1 < grid.cols) edges.push({ a: grid.cells[y][x], b: grid.cells[y][x + 1], dir: 'E' });
      if (y + 1 < grid.rows) edges.push({ a: grid.cells[y][x], b: grid.cells[y + 1][x], dir: 'S' });
    }
    shuffle(edges, rnd);
    for (const e of edges) {
      if (union(e.a, e.b)) { removeWall(e.a, e.b, e.dir); yield { frontier: [e.a, e.b] }; }
    }
  }

  function* wilsons(grid, rnd) {
    const unvisited = new Set();
    for (let y = 0; y < grid.rows; y++) for (let x = 0; x < grid.cols; x++) unvisited.add(grid.cells[y][x]);
    const first = [...unvisited][Math.floor(rnd() * unvisited.size)];
    unvisited.delete(first);
    first.visited = true;
    while (unvisited.size) {
      const start = [...unvisited][Math.floor(rnd() * unvisited.size)];
      let cur = start;
      const pathDir = new Map();
      while (unvisited.has(cur)) {
        const ns = neighbors(grid, cur);
        const pick = ns[Math.floor(rnd() * ns.length)];
        pathDir.set(cur, pick.dir);
        cur = pick.cell;
        yield { frontier: [cur], walk: [...pathDir.keys()] };
      }
      // carve path
      cur = start;
      while (unvisited.has(cur)) {
        const d = pathDir.get(cur);
        const nx = cur.x + DX[d], ny = cur.y + DY[d];
        const next = grid.cells[ny][nx];
        removeWall(cur, next, d);
        cur.visited = true;
        unvisited.delete(cur);
        cur = next;
        yield { frontier: [cur] };
      }
    }
  }

  function* division(grid, rnd) {
    // start with no walls, add outer-only, then recursively divide.
    for (let y = 0; y < grid.rows; y++) for (let x = 0; x < grid.cols; x++) {
      const c = grid.cells[y][x];
      c.walls.N = y === 0; c.walls.S = y === grid.rows - 1;
      c.walls.W = x === 0; c.walls.E = x === grid.cols - 1;
    }
    function* divide(x, y, w, h) {
      if (w < 2 || h < 2) return;
      const horiz = w < h ? true : w > h ? false : rnd() < 0.5;
      if (horiz) {
        const wallY = y + Math.floor(rnd() * (h - 1));
        const passX = x + Math.floor(rnd() * w);
        for (let i = 0; i < w; i++) if (x + i !== passX) {
          grid.cells[wallY][x + i].walls.S = true;
          grid.cells[wallY + 1][x + i].walls.N = true;
        }
        yield { frontier: [grid.cells[wallY][passX]] };
        yield* divide(x, y, w, wallY - y + 1);
        yield* divide(x, wallY + 1, w, y + h - wallY - 1);
      } else {
        const wallX = x + Math.floor(rnd() * (w - 1));
        const passY = y + Math.floor(rnd() * h);
        for (let i = 0; i < h; i++) if (y + i !== passY) {
          grid.cells[y + i][wallX].walls.E = true;
          grid.cells[y + i][wallX + 1].walls.W = true;
        }
        yield { frontier: [grid.cells[passY][wallX]] };
        yield* divide(x, y, wallX - x + 1, h);
        yield* divide(wallX + 1, y, x + w - wallX - 1, h);
      }
    }
    yield* divide(0, 0, grid.cols, grid.rows);
  }

  function* sidewinder(grid, rnd) {
    for (let y = 0; y < grid.rows; y++) {
      let run = [];
      for (let x = 0; x < grid.cols; x++) {
        const cur = grid.cells[y][x];
        run.push(cur);
        const eastBound = x === grid.cols - 1;
        const northBound = y === 0;
        const closeOut = eastBound || (!northBound && rnd() < 0.5);
        if (closeOut) {
          if (!northBound) {
            const pick = run[Math.floor(rnd() * run.length)];
            removeWall(pick, grid.cells[pick.y - 1][pick.x], 'N');
          }
          run = [];
        } else {
          removeWall(cur, grid.cells[y][x + 1], 'E');
        }
        yield { frontier: [cur] };
      }
    }
  }

  const ALGORITHMS = {
    backtracking: { name: 'Recursive Backtracking', desc: '구불구불', gen: backtracking },
    prims: { name: "Prim's", desc: '분기 많음', gen: prims },
    kruskals: { name: "Kruskal's", desc: '균일, 짧은 경로', gen: kruskals },
    wilsons: { name: "Wilson's", desc: '편향 없음', gen: wilsons },
    division: { name: 'Recursive Division', desc: '방 구조', gen: division },
    sidewinder: { name: 'Sidewinder', desc: '수평 흐름', gen: sidewinder },
  };

  // ── BFS 정답 경로 ────────────────────────────────
  function solve(grid, start, end) {
    const q = [start];
    const prev = new Map();
    prev.set(start, null);
    while (q.length) {
      const c = q.shift();
      if (c === end) break;
      for (const d of ['N', 'E', 'S', 'W']) {
        if (c.walls[d]) continue;
        const nx = c.x + DX[d], ny = c.y + DY[d];
        const n = grid.cells[ny] && grid.cells[ny][nx];
        if (!n || prev.has(n)) continue;
        prev.set(n, c); q.push(n);
      }
    }
    const path = [];
    let cur = end;
    while (cur) { path.push(cur); cur = prev.get(cur); }
    return path.reverse();
  }

  function build(opts) {
    const cols = opts.cols, rows = opts.rows;
    const grid = makeGrid(cols, rows);
    const seedNum = hashSeed(opts.seed);
    const rnd = mulberry32(seedNum);
    const algo = ALGORITHMS[opts.algo] || ALGORITHMS.backtracking;
    const gen = algo.gen(grid, rnd);
    return { grid, gen, algo: opts.algo, seedStr: opts.seed || seedNum.toString(36) };
  }

  window.MazeEngine = { ALGORITHMS, build, solve, makeGrid, hashSeed };
})();

</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// maze-renderers.jsx — 3가지 스타일의 미로 렌더러
// 모두 Canvas 2D 사용, 공통 인터페이스 { grid, solution, cell, theme, progress? }

const MazeRenderers = (() => {

  // ── 공통 유틸 ────────────────────────────────────
  // wobbly 라인: 점 사이 중간점에 jitter 추가
  function wobblyLine(ctx, x1, y1, x2, y2, amp, seed) {
    const steps = Math.max(2, Math.floor(Math.hypot(x2 - x1, y2 - y1) / 8));
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const px = x1 + (x2 - x1) * t;
      const py = y1 + (y2 - y1) * t;
      // deterministic jitter
      const h = Math.sin(seed + i * 12.9898) * 43758.5453;
      const j1 = (h - Math.floor(h) - 0.5) * amp;
      const h2 = Math.sin(seed + i * 78.233) * 43758.5453;
      const j2 = (h2 - Math.floor(h2) - 0.5) * amp;
      // perpendicular jitter
      const dx = (y2 - y1), dy = -(x2 - x1);
      const n = Math.hypot(dx, dy) || 1;
      ctx.lineTo(px + (dx / n) * j1, py + (dy / n) * j1 + j2 * 0.2);
    }
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // ── 1. 크레용 놀이터 ────────────────────────────
  function crayonPaper(ctx, W, H, opts) {
    const { grid, solution, cell, theme, progress, mascot } = opts;
    // paper background
    ctx.fillStyle = theme.paper;
    ctx.fillRect(0, 0, W, H);
    // speckle texture
    for (let i = 0; i < (W * H) / 180; i++) {
      const x = Math.random() * W, y = Math.random() * H;
      ctx.fillStyle = `rgba(120,90,60,${0.03 + Math.random() * 0.04})`;
      ctx.fillRect(x, y, 1, 1);
    }

    const pad = cell * 0.6;
    ctx.translate(pad, pad);

    // walls: crayon-like, thick, slight offset doubled-stroke
    const drawWall = (x1, y1, x2, y2, ci) => {
      // shadow trace
      ctx.strokeStyle = theme.wallShadow;
      ctx.lineWidth = cell * 0.22;
      ctx.lineCap = 'round';
      wobblyLine(ctx, x1 + 1.2, y1 + 1.5, x2 + 1.2, y2 + 1.5, cell * 0.08, ci * 17);
      // main
      ctx.strokeStyle = theme.wall;
      ctx.lineWidth = cell * 0.18;
      wobblyLine(ctx, x1, y1, x2, y2, cell * 0.08, ci * 17);
    };

    let ci = 0;
    for (let y = 0; y < grid.rows; y++) {
      for (let x = 0; x < grid.cols; x++) {
        const c = grid.cells[y][x];
        const x0 = x * cell, y0 = y * cell, x1 = x0 + cell, y1 = y0 + cell;
        if (c.walls.N) drawWall(x0, y0, x1, y0, ci++);
        if (c.walls.W) drawWall(x0, y0, x0, y1, ci++);
        if (y === grid.rows - 1 && c.walls.S) drawWall(x0, y1, x1, y1, ci++);
        if (x === grid.cols - 1 && c.walls.E) drawWall(x1, y0, x1, y1, ci++);
      }
    }

    // solution: colorful dotted trail
    if (solution) {
      ctx.globalAlpha = 0.9;
      const palette = theme.trail;
      for (let i = 0; i < solution.length; i++) {
        const c = solution[i];
        const cx = c.x * cell + cell / 2;
        const cy = c.y * cell + cell / 2;
        ctx.fillStyle = palette[i % palette.length];
        ctx.beginPath();
        ctx.arc(cx, cy, cell * 0.18, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // start & end mascots
    const drawMascot = (c, emoji, label, color) => {
      const cx = c.x * cell + cell / 2;
      const cy = c.y * cell + cell / 2;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(cx, cy, cell * 0.42, 0, Math.PI * 2);
      ctx.fill();
      ctx.font = `${Math.floor(cell * 0.55)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, cx, cy + cell * 0.03);
    };
    drawMascot(grid.cells[0][0], mascot.start, '출발', theme.startBg);
    drawMascot(grid.cells[grid.rows - 1][grid.cols - 1], mascot.end, '도착', theme.endBg);

    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  // ── 2. 젤리 팝 ────────────────────────────────
  function jellyPop(ctx, W, H, opts) {
    const { grid, solution, cell, theme } = opts;
    // gradient bg
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, theme.bgA);
    g.addColorStop(1, theme.bgB);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    const pad = cell * 0.7;
    ctx.translate(pad, pad);

    // rounded walls using path segments; draw as joined rounded-rect-ish shapes
    // Strategy: draw each cell's walls as rounded lines
    ctx.strokeStyle = theme.wall;
    ctx.lineWidth = cell * 0.2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // outer glow
    ctx.shadowColor = theme.glow;
    ctx.shadowBlur = cell * 0.6;

    for (let y = 0; y < grid.rows; y++) {
      for (let x = 0; x < grid.cols; x++) {
        const c = grid.cells[y][x];
        const x0 = x * cell, y0 = y * cell, x1 = x0 + cell, y1 = y0 + cell;
        const m = cell * 0.08;
        if (c.walls.N) { ctx.beginPath(); ctx.moveTo(x0 + m, y0); ctx.lineTo(x1 - m, y0); ctx.stroke(); }
        if (c.walls.W) { ctx.beginPath(); ctx.moveTo(x0, y0 + m); ctx.lineTo(x0, y1 - m); ctx.stroke(); }
        if (y === grid.rows - 1 && c.walls.S) { ctx.beginPath(); ctx.moveTo(x0 + m, y1); ctx.lineTo(x1 - m, y1); ctx.stroke(); }
        if (x === grid.cols - 1 && c.walls.E) { ctx.beginPath(); ctx.moveTo(x1, y0 + m); ctx.lineTo(x1, y1 - m); ctx.stroke(); }
      }
    }
    ctx.shadowBlur = 0;

    // solution — rainbow gradient line
    if (solution && solution.length > 1) {
      const grad = ctx.createLinearGradient(0, 0, grid.cols * cell, grid.rows * cell);
      theme.trail.forEach((c, i) => grad.addColorStop(i / (theme.trail.length - 1), c));
      ctx.strokeStyle = grad;
      ctx.lineWidth = cell * 0.3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      solution.forEach((c, i) => {
        const px = c.x * cell + cell / 2, py = c.y * cell + cell / 2;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.stroke();
    }

    // start / end as glowing jelly dots
    const drawDot = (c, color) => {
      const cx = c.x * cell + cell / 2, cy = c.y * cell + cell / 2;
      const rg = ctx.createRadialGradient(cx, cy, cell * 0.1, cx, cy, cell * 0.5);
      rg.addColorStop(0, '#fff');
      rg.addColorStop(0.4, color);
      rg.addColorStop(1, color + '00');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.arc(cx, cy, cell * 0.5, 0, Math.PI * 2);
      ctx.fill();
    };
    drawDot(grid.cells[0][0], theme.start);
    drawDot(grid.cells[grid.rows - 1][grid.cols - 1], theme.end);

    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  // ── 3. 스티커북 ────────────────────────────────
  function stickerBook(ctx, W, H, opts) {
    const { grid, solution, cell, theme } = opts;
    // notebook bg
    ctx.fillStyle = theme.paper;
    ctx.fillRect(0, 0, W, H);
    // notebook lines
    ctx.strokeStyle = 'rgba(90,120,160,0.15)';
    ctx.lineWidth = 1;
    for (let y = 20; y < H; y += 24) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    // left margin
    ctx.strokeStyle = 'rgba(220,100,120,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(60, 0); ctx.lineTo(60, H); ctx.stroke();

    const pad = cell * 0.8;
    ctx.translate(Math.max(pad, 70), pad);

    // walls — bold black marker with slight ink bleed
    ctx.strokeStyle = theme.wall;
    ctx.lineWidth = cell * 0.15;
    ctx.lineCap = 'round';

    for (let y = 0; y < grid.rows; y++) {
      for (let x = 0; x < grid.cols; x++) {
        const c = grid.cells[y][x];
        const x0 = x * cell, y0 = y * cell, x1 = x0 + cell, y1 = y0 + cell;
        if (c.walls.N) wobblyLine(ctx, x0, y0, x1, y0, cell * 0.04, (x + y) * 31);
        if (c.walls.W) wobblyLine(ctx, x0, y0, x0, y1, cell * 0.04, (x + y) * 53);
        if (y === grid.rows - 1 && c.walls.S) wobblyLine(ctx, x0, y1, x1, y1, cell * 0.04, (x + y) * 71);
        if (x === grid.cols - 1 && c.walls.E) wobblyLine(ctx, x1, y0, x1, y1, cell * 0.04, (x + y) * 89);
      }
    }

    // solution — dashed highlighter
    if (solution && solution.length > 1) {
      ctx.strokeStyle = theme.highlight;
      ctx.globalCompositeOperation = 'multiply';
      ctx.lineWidth = cell * 0.55;
      ctx.lineCap = 'round';
      ctx.beginPath();
      solution.forEach((c, i) => {
        const px = c.x * cell + cell / 2, py = c.y * cell + cell / 2;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    }

    // stickers for start/end
    const drawSticker = (c, color, emoji) => {
      const cx = c.x * cell + cell / 2, cy = c.y * cell + cell / 2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(((c.x + c.y) % 2 ? 0.12 : -0.1));
      // sticker border (white)
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(0, 0, cell * 0.44, 0, Math.PI * 2);
      ctx.fill();
      // inner color
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(0, 0, cell * 0.36, 0, Math.PI * 2);
      ctx.fill();
      // shadow
      ctx.shadowColor = 'rgba(0,0,0,0.2)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;
      // emoji
      ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
      ctx.font = `${Math.floor(cell * 0.5)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, 0, cell * 0.02);
      ctx.restore();
    };
    drawSticker(grid.cells[0][0], theme.start, '🏁');
    drawSticker(grid.cells[grid.rows - 1][grid.cols - 1], theme.end, '⭐');

    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  return { crayonPaper, jellyPop, stickerBook };
})();

window.MazeRenderers = MazeRenderers;

</script>

function AlgoInfoModal({ variant, theme, algo, onClose }) {

// ── 토스트 ────────────────────────────────────────

Object.assign(window, {

    accent: '#ff6b6b',
    accent2: '#ffd93d',
    accent3: '#6bcb77',
    accent4: '#a78bfa',
    text: '#3d2f1f',
    fontBody: '"Pretendard", "Noto Sans KR", sans-serif',
    fontAccent: '"Gaegu", "Pretendard", sans-serif',
    canvas: {
      paper: '#fef9ec',
      wall: '#3d2f1f',
      wallShadow: 'rgba(255,107,107,0.3)',
      startBg: '#ffd93d',
      endBg: '#ff6b6b',
      trail: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4ecdc4', '#a78bfa'],
    },
    mascot: { start: '🐰', end: '🧀' },
    renderer: 'crayonPaper',
  },
  jelly: {
    name: '젤리 팝',
    bg: '#1a1033',
    panelBg: 'rgba(255,255,255,0.08)',
    accent: '#ff6ec7',
    accent2: '#4dd0ff',
    accent3: '#b794f6',
    accent4: '#ffd93d',
    text: '#f4f1ff',
    fontBody: '"Pretendard", "Noto Sans KR", sans-serif',
    fontAccent: '"Pretendard", sans-serif',
    canvas: {
      bgA: '#2d1b5e',
      bgB: '#1a1033',
      wall: '#f4f1ff',
      glow: 'rgba(180,140,255,0.5)',
      start: '#4dd0ff',
      end: '#ff6ec7',
      trail: ['#ff6ec7', '#b794f6', '#4dd0ff', '#ffd93d', '#ff6ec7'],
    },
    mascot: { start: '🚀', end: '🌟' },
    renderer: 'jellyPop',
  },
  sticker: {
    name: '스티커북',
    bg: '#f6f1e7',
    panelBg: '#ffffff',
    accent: '#e63946',
    accent2: '#f4a261',
    accent3: '#2a9d8f',
    accent4: '#264653',
    text: '#1d2d44',
    fontBody: '"Pretendard", "Noto Sans KR", sans-serif',
    fontAccent: '"Gaegu", "Pretendard", sans-serif',
    canvas: {
      paper: '#fdfcf5',
      wall: '#1d2d44',
      highlight: 'rgba(255,230,0,0.6)',
      start: '#e63946',
      end: '#f4a261',
    },
    mascot: { start: '🏁', end: '⭐' },
    renderer: 'stickerBook',
  },
};

// ── 메인 앱 ───────────────────────────────────────
function MazeApp({ variant = 'crayon' }) {
  const theme = THEMES[variant];
  const [cols, setCols] = useState(20);
  const [rows, setRows] = useState(14);
  const [cell, setCell] = useState(28);
  const [algo, setAlgo] = useState('backtracking');
  const [seed, setSeed] = useState('');
  const [showSolution, setShowSolution] = useState(false);
  const [animating, setAnimating] = useState(false);
  const [progress, setProgress] = useState(1);
  const [gallery, setGallery] = useState([]);
  const [showAlgoInfo, setShowAlgoInfo] = useState(false);
  const [toast, setToast] = useState('');

  const canvasRef = useRef(null);
  const stateRef = useRef(null);
  const animRef = useRef(null);
  const containerRef = useRef(null);
  const [displaySize, setDisplaySize] = useState({ w: 800, h: 600 });

  // 반응형 셀 크기
  useEffect(() => {
    const update = () => {
      if (!containerRef.current) return;
      const w = containerRef.current.clientWidth;
      const h = containerRef.current.clientHeight;
      const maxCell = Math.min(
        Math.floor((w - 80) / cols),
        Math.floor((h - 80) / rows),
        cell + 10
      );
      const actual = Math.max(14, Math.min(maxCell, cell));
      setDisplaySize({ w, h, actual });
    };
    update();
    const ro = new ResizeObserver(update);
    if (containerRef.current) ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, [cols, rows, cell]);

  // 렌더 함수
  const render = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas || !stateRef.current) return;
    const { grid } = stateRef.current;
    const c = displaySize.actual || cell;
    const pad = c * 0.8;
    const W = cols * c + pad * 2;
    const H = rows * c + pad * 2;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const sol = showSolution && !animating
      ? MazeEngine.solve(grid, grid.cells[0][0], grid.cells[rows - 1][cols - 1])
      : null;
    MazeRenderers[theme.renderer](ctx, W, H, {
      grid, solution: sol, cell: c, theme: theme.canvas,
      mascot: theme.mascot, progress,
    });
  }, [cols, rows, cell, showSolution, animating, theme, progress, displaySize.actual]);

  // 미로 생성 (애니메이션)
  const build = useCallback((animated = true) => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
    const useSeed = seed || Math.floor(Math.random() * 1e8).toString(36);
    const s = MazeEngine.build({ cols, rows, algo, seed: useSeed });
    stateRef.current = s;
    setSeed(useSeed);

    if (!animated) {
      while (!s.gen.next().done) {}
      setAnimating(false);
      setProgress(1);
      render();
      return;
    }

    setAnimating(true);
    setProgress(0);
    const totalSteps = cols * rows * 2;
    let stepCount = 0;
    const stepsPerFrame = Math.max(1, Math.floor(cols * rows / 120));

    const loop = () => {
      for (let i = 0; i < stepsPerFrame; i++) {
        const r = s.gen.next();
        stepCount++;
        if (r.done) {
          setAnimating(false);
          setProgress(1);
          render();
          return;
        }
      }
      setProgress(Math.min(0.99, stepCount / totalSteps));
      render();
      animRef.current = requestAnimationFrame(loop);
    };
    loop();
  }, [cols, rows, algo, seed, render]);

  // 초기 생성 + 값 변경시 재생성(애니 없이)
  useEffect(() => {
    build(false);
    // eslint-disable-next-line
  }, [cols, rows, algo]);

  useEffect(() => { render(); }, [render]);

  // 툴바 액션
  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(''), 1600); };

  const onCopy = async () => {
    try {
      const canvas = canvasRef.current;
      canvas.toBlob(async (blob) => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          flash('이미지 복사됨! 📋');
        } catch {
          flash('복사 실패 😢');
        }
      });
    } catch { flash('복사 실패 😢'); }
  };

  const onDownload = () => {
    const canvas = canvasRef.current;
    const link = document.createElement('a');
    link.download = `maze-${algo}-${seed}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    flash('PNG 저장됨! 💾');
  };

  const onShare = async () => {
    const canvas = canvasRef.current;
    canvas.toBlob(async (blob) => {
      const file = new File([blob], `maze-${seed}.png`, { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: '내가 만든 미로!' }); return; } catch {}
      }
      onCopy();
    });
  };

  const onPrint = () => {
    const canvas = canvasRef.current;
    const w = window.open('');
    w.document.write(`<html><body style="margin:0"><img src="${canvas.toDataURL()}" style="width:100%"/></body></html>`);
    w.print();
  };

  const saveToGallery = () => {
    const canvas = canvasRef.current;
    const thumb = canvas.toDataURL('image/png');
    setGallery((g) => [{ id: Date.now(), thumb, algo, seed, cols, rows }, ...g].slice(0, 12));
    flash('갤러리에 추가됨! 🎨');
  };

  const loadFromGallery = (item) => {
    setCols(item.cols); setRows(item.rows); setAlgo(item.algo); setSeed(item.seed);
    setTimeout(() => build(false), 50);
  };

  return (
    <div ref={containerRef} style={{
      position: 'relative', width: '100%', height: '100%',
      background: theme.bg, color: theme.text,
      fontFamily: theme.fontBody, overflow: 'hidden',
    }}>
      {/* 배경 장식 (variant별) */}
      <BackgroundDecor variant={variant} />

      {/* 미로 캔버스 (중앙) */}
      <div style={{
        position: 'absolute', inset: 0, display: 'flex',
        alignItems: 'center', justifyContent: 'center',
      }}>
        <canvas ref={canvasRef} style={{
          maxWidth: '100%', maxHeight: '100%',
          filter: animating ? 'none' : variant === 'jelly' ? 'drop-shadow(0 10px 40px rgba(180,140,255,0.4))' : 'none',
        }} />
      </div>

      {/* 상단 타이틀 */}
      <TopTitle variant={variant} theme={theme} />

      {/* 플로팅 컨트롤 패널 */}
      <ControlPanel
        variant={variant} theme={theme}
        cols={cols} setCols={setCols}
        rows={rows} setRows={setRows}
        cell={cell} setCell={setCell}
        algo={algo} setAlgo={setAlgo}
        seed={seed} setSeed={setSeed}
        showSolution={showSolution} setShowSolution={setShowSolution}
        animating={animating}
        onBuild={() => build(true)}
        onCopy={onCopy}
        onDownload={onDownload}
        onShare={onShare}
        onPrint={onPrint}
        onSaveGallery={saveToGallery}
        onShowAlgoInfo={() => setShowAlgoInfo(true)}
      />

      {/* 갤러리 */}
      <Gallery variant={variant} theme={theme} items={gallery}
        onLoad={loadFromGallery}
        onDelete={(id) => setGallery((g) => g.filter((x) => x.id !== id))} />

      {/* 알고리즘 설명 모달 */}
      {showAlgoInfo && (
        <AlgoInfoModal variant={variant} theme={theme} algo={algo}
          onClose={() => setShowAlgoInfo(false)} />
      )}

      {/* 토스트 */}
      {toast && <Toast variant={variant} theme={theme} msg={toast} />}
    </div>
  );
}

window.MazeApp = MazeApp;
window.THEMES = THEMES;

</script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(MazeApp, { variant: 'crayon' })
);
</script>
</body>
